services:
  gpufleet:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      GPUFLEET_ENVIRONMENT: production
      GPUFLEET_DEBUG: "false"
      GPUFLEET_DATABASE_PATH: /app/data/gpufleet.db
      GPUFLEET_STORAGE_PATH: /app/runtime/storage
      GPUFLEET_FRONTEND_DIST_PATH: /app/frontend/dist
      GPUFLEET_PUBLIC_BASE_URL: https://localhost
    volumes:
      - ./data:/app/data
      - ./runtime:/app/runtime
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    depends_on:
      gpufleet:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
